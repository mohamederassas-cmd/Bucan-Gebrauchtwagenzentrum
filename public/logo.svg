<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60" fill="none">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9A7A2E"/>
      <stop offset="40%" style="stop-color:#C9A84C"/>
      <stop offset="70%" style="stop-color:#E8C96A"/>
      <stop offset="100%" style="stop-color:#9A7A2E"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:transparent"/>
      <stop offset="30%" style="stop-color:#C9A84C"/>
      <stop offset="70%" style="stop-color:#E8C96A"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
  </defs>

  <!-- B Icon Mark -->
  <g transform="translate(0, 6)">
    <!-- Outer diamond/shield shape -->
    <path d="M24 0 L48 12 L48 36 L24 48 L0 36 L0 12 Z" fill="none" stroke="url(#goldGrad)" stroke-width="1.5"/>
    <!-- Inner B letterform -->
    <text x="24" y="35" text-anchor="middle" font-family="Georgia, serif" font-weight="700" font-size="26" fill="url(#goldGrad)">B</text>
  </g>

  <!-- Wordmark: BUCAN -->
  <text x="62" y="32" font-family="'Barlow Condensed', 'Arial Narrow', sans-serif" font-weight="700" font-size="28" letter-spacing="5" fill="url(#goldGrad)">BUCAN</text>

  <!-- Subline: AUTOMOBILE -->
  <text x="62" y="50" font-family="'Barlow Condensed', 'Arial Narrow', sans-serif" font-weight="400" font-size="11" letter-spacing="6" fill="#888888">AUTOMOBILE</text>

  <!-- Gold accent line below wordmark -->
  <rect x="62" y="54" width="170" height="1" fill="url(#lineGrad)" opacity="0.6"/>
</svg>
